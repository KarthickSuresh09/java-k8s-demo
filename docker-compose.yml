version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-db
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root@123
      MYSQL_DATABASE: studentDB
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5
      timeout: 5s

  app:
    build: .
    container_name: spring-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_NAME: studentDB
      DB_USER: root
      DB_PASS: root@123
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
